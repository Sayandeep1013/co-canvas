<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Warm paper/canvas background -->
  <rect width="32" height="32" rx="6" fill="#f7f5f0" stroke="#e7e2d9" stroke-width="1.5"/>
  
  <!-- Canvas grid lines (subtle) -->
  <g stroke="#e7e2d9" stroke-width="0.5" opacity="0.6">
    <line x1="6" y1="6" x2="26" y2="6"/>
    <line x1="6" y1="11" x2="26" y2="11"/>
    <line x1="6" y1="16" x2="20" y2="16"/>
    <line x1="6" y1="21" x2="24" y2="21"/>
    <line x1="6" y1="26" x2="18" y2="26"/>
  </g>
  
  <!-- Pen tool (writing) - terracotta accent -->
  <path d="M22 8L26 4" stroke="#c2410c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M22 8L16 14" stroke="#c2410c" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M16 14L10 20" stroke="#c2410c" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="10" cy="20" r="1.5" fill="#c2410c"/>
  
  <!-- Brush tool (drawing) - warm accent -->
  <path d="M8 24L14 18" stroke="#fb923c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  <path d="M14 18C15.5 16.5 18 16 19.5 16.5C21 17 22 18.5 22 20" stroke="#fb923c" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  <path d="M19.5 16.5L17 19" stroke="#fb923c" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <path d="M20 17.5L18.5 19.5" stroke="#fb923c" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  
  <!-- Small dot accents for "canvas" feel -->
  <circle cx="24" cy="24" r="1" fill="#c2410c" opacity="0.5"/>
  <circle cx="27" cy="26" r="0.7" fill="#fb923c" opacity="0.5"/>
</svg>